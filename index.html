<!DOCTYPE html>
<html lang="zh-CN" data-theme="aurora" data-mode="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>我的导航</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-decor" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-logo">🧭</span>
      <div class="brand-text">
        <h1 id="site-title">我的导航</h1>
        <p id="site-subtitle" class="subtitle"></p>
      </div>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path fill="currentColor" d="M21 20.3l-5.4-5.4a7.5 7.5 0 1 0-.7.7L20.3 21zM5 10.5A5.5 5.5 0 1 1 10.5 16 5.5 5.5 0 0 1 5 10.5z"/>
      </svg>
      <input id="search" type="search" placeholder="搜索 / Search…" autocomplete="off" spellcheck="false" />
      <kbd class="search-kbd">/</kbd>
    </div>

    <div class="actions">
      <button id="mode-toggle" class="icon-btn" title="切换明暗 (亮/暗)" aria-label="切换明暗">
        <span class="mode-sun">☀️</span><span class="mode-moon">🌙</span>
      </button>
      <button id="theme-btn" class="icon-btn" title="切换风格" aria-label="切换风格">🎨</button>
      <button id="settings-btn" class="icon-btn" title="设置" aria-label="设置">⚙️</button>
    </div>
  </header>

  <main id="content" class="content">
    <div id="status" class="status">正在加载配置…</div>
    <div id="groups" class="groups"></div>
  </main>

  <footer class="footer">
    <span id="footer-text"></span>
  </footer>

  <!-- 风格选择面板 -->
  <div id="theme-panel" class="panel" hidden>
    <div class="panel-card">
      <div class="panel-head">
        <h2>选择风格</h2>
        <button class="icon-btn panel-close" data-close="theme-panel">✕</button>
      </div>
      <div class="theme-grid" id="theme-grid"></div>
    </div>
  </div>

  <!-- 设置面板 -->
  <div id="settings-panel" class="panel" hidden>
    <div class="panel-card">
      <div class="panel-head">
        <h2>设置</h2>
        <button class="icon-btn panel-close" data-close="settings-panel">✕</button>
      </div>
      <label class="field-label" for="config-url">配置文件链接 (YAML / JSON)</label>
      <input id="config-url" type="url" class="text-input" placeholder="https://your-bucket.r2.dev/config.yaml" />
      <p class="hint">填入你的 R2 / 任意公开链接。留空则使用网站内置的 <code>config.yaml</code>。链接会保存在本浏览器。</p>
      <div class="field-row">
        <label class="switch">
          <input type="checkbox" id="favicon-toggle" checked />
          <span>显示网站图标 (favicon)</span>
        </label>
      </div>
      <div class="panel-actions">
        <button id="config-reset" class="btn btn-ghost">恢复默认</button>
        <button id="config-save" class="btn btn-primary">保存并刷新</button>
      </div>
    </div>
  </div>

  <script src="./vendor/js-yaml.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
